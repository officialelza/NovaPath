<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="NovaPath — ISS Satellite Tracking Data from Dwingeloo Radio Telescope, Netherlands. Explore radio recordings, signal analysis, and orbital data.">
  <title>NovaPath — ISS Satellite Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/landing.css">

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

  <!-- Starfield Background -->
  <div class="starfield"></div>
  <div class="nebula-bg"></div>

  <!-- Navigation Bar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo">NovaPath</a>
      <button class="nav-hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="details.html">Details</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </div>
  </nav>

  <!-- 3D Scene Container -->
  <div class="scene-container" id="scene-container"></div>

  <!-- Hero Overlay -->
  <div class="hero-overlay">
    <h1 class="hero-title">NovaPath</h1>
    <p class="hero-subtitle">ISS Signal Tracking · Dwingeloo Observatory</p>
    <p class="hero-hint">⟡ hover over the orbiting nodes to explore ⟡</p>
  </div>

  <!-- Bottom Watermark (appears after hero fades) -->
  <div class="hero-bottom">
    <div class="hero-title-sm">NovaPath</div>
    <div class="hero-sub-sm">ISS Signal Tracking · Dwingeloo</div>
  </div>

  <!-- Day Label Tooltip -->
  <div class="day-label" id="day-label"></div>

  <!-- Modal Popup -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>

      <h2 class="modal-date glow-text" id="modal-date-text">—</h2>

      <div class="modal-meta">
        <div class="modal-meta-item">
          <span class="label">Time</span>
          <span class="value" id="modal-time">—</span>
        </div>
        <div class="modal-meta-item">
          <span class="label">Frequency</span>
          <span class="value freq-badge" id="modal-freq">—</span>
        </div>
      </div>

      <div class="modal-section">
        <h3 class="modal-section-title">📡 Radio Signal</h3>
        <div class="audio-player">
          <audio id="modal-audio" controls preload="none">
            Your browser does not support the audio element.
          </audio>
        </div>
      </div>

      <div class="modal-section">
        <h3 class="modal-section-title">📝 Transcription</h3>
        <div class="transcription-box" id="modal-transcription">
          <p class="pending">Transcription pending…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Music Toggle -->
  <button class="music-toggle" id="music-toggle" aria-label="Toggle ambient music" title="Toggle ambient space music">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </button>

  <!-- Scripts -->
  <script src="js/audioData.js"></script>
  <script src="js/main.js"></script>
  <script src="js/landing.js"></script>
</body>

</html>
